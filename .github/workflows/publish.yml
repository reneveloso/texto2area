name: Publicar no PyPI

# Publica via Trusted Publishing (OIDC) — sem token/segredo.
# Dispara ao publicar um release, ou manualmente (workflow_dispatch).
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # necessário para o OIDC do Trusted Publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Construir wheel e sdist
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publicar no PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
